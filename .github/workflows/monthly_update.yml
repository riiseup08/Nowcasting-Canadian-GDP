name: Monthly GDP Update

on:
  schedule:
    # Runs at 06:00 UTC on the 1st of every month
    - cron: '0 6 1 * *'
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # allow the GITHUB_TOKEN to push the auto-update commit
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ETL pipeline → save local CSV + push to Supabase
        run: python transform.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Retrain model → save metrics
        run: python train_model.py

      - name: Commit updated model and metrics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add models/
          # Commit only if there are changes
          git diff --quiet && git diff --staged --quiet || git commit -m "auto: monthly model update [skip ci]"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/riiseup08/Nowcasting-Canadian-GDP.git main

      - name: Generate LLM-powered digest
        run: python send_digest.py
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Send digest email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: 📊 GDP Nowcast Digest — Monthly Update
          to: monthe1994@gmail.com
          from: GDP Nowcast Bot
          html_body: file://output/digest.html
          secure: false